[root@kt10ap52 conf.d]# cat warritest-8080.conf
server {
    listen 8080;
    server_name localhost;

    root /var/www/warritest8080;
    index index.html;

    # Only include dos_enforce once
    include /etc/nginx/conf.d/dos_enforce.conf;

    location / {
        try_files $uri =404;
    }
}

